<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <style>
       *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#202B3B;
            overflow-x:hidden;
        }

        #empty-box{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: #212529;
            z-index:9999;
        }

        #empty-box h1{
            color:#fff;
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight:700;
            letter-spacing:2px;
            animation:pulse 1.5s infinite;
        }

        @keyframes pulse{
            0%{
                opacity:.4;
                transform:scale(.95);
            }
            50%{
                opacity:1;
                transform:scale(1);
            }
            100%{
                opacity:.4;
                transform:scale(.95);
            }
        }
    </style>
</head>

<body class="bg-dark text-white">
    <div class="container py-4">
        
        <!-- Splash Screen -->
        <div id="empty-box">
            <h1>
                Weather Forecast
            </h1>
        </div>

        <!-- Main App -->
        <div class="container py-4" id="form-box" style="display: none;">
            <h1 class="text-center mb-4">
                Weather Forecast
            </h1>
            <form class="row g-3" onsubmit="getData(event)">
                <div class="col-md-10">
                    <input
                        type="text"
                        placeholder="Enter location"
                        id="text-box"
                        class="form-control"
                    >
                </div>
                <div class="col-md-2">
                    <input
                        type="submit"
                        value="SEARCH"
                        id="search"
                        class="btn btn-warning w-100"
                    >
                </div>
            </form>
        </div>

        <!-- Weather Result -->
        <div id="ref" class="w-100 mt-4">
            <!-- Weather Data -->

        </div>

        <!-- Loader -->
        <div
            class="spinner-border m-5"
            role="status"
            id="load"
            style="display: none;"
        >
            <span class="visually-hidden">
                Loading...
            </span>
        </div>
    </div>

    <script src="https://kit.fontawesome.com/9c6b207375.js" crossorigin="anonymous"></script>
    <script src="./script.js"></script>
</body>
</html>
