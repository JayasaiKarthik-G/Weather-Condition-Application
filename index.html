<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <style>
        @media (max-width: 375px){
            #current{
                padding: 0px 20px !important;
            }
        }
    </style>
</head>

<body class="bg-dark text-white">
    <div class="container py-4">
        <h1 class="text-center mb-4">
            Weather App
        </h1>
        <!-- Default Message -->
        <div id="empty-box" class="text-center mt-5">
            <h2>
                No Active Condition
            </h2>
            <p class="mt-3 fs-5 text-white-50">
                There are no any weather condition without mention city <br>
                Please search your city weather condition.
            </p>
            <button onclick="showForm()" class="btn btn-info mt-3">
                City
            </button>
        </div>
        <!-- Form -->
        <div id="form-box" style="display: none;">
            <form class="row g-3" onsubmit="getData(event)">
                <div class="col-md-10">
                    <input
                        type="text"
                        placeholder="Enter location"
                        id="text-box"
                        class="form-control"
                    >
                </div>
                <div class="col-md-2">
                    <input
                        type="submit"
                        value="SEARCH"
                        id="search"
                        class="btn btn-warning w-100"
                    >
                </div>
            </form>
        </div>

        <!-- Weather Result -->
        <div id="ref" class="w-100 mt-4">
            <!-- Weather Data -->

        </div>

        <!-- Loader -->
        <div
            class="spinner-border m-5"
            role="status"
            id="load"
            style="display: none;"
        >
            <span class="visually-hidden">
                Loading...
            </span>
        </div>
    </div>

    <script src="https://kit.fontawesome.com/9c6b207375.js" crossorigin="anonymous"></script>
    <script src="./script.js"></script>
</body>
</html>
